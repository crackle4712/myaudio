<body>
    <h2>Now Playing</h2>
    
    <audio id="myAudio" preload="none">
        <source src="https://www.dropbox.com/scl/fi/jl2rgwkucjd7tx2xe9k6e/The-Complete-Holy-Quran-By-Sheikh-Mishary-Al-Afasy-1-3.mp3?rlkey=nufwqgunjzwtne62t5a5xm02n&st=10dlix2p&raw=1" type="audio/mpeg">
    </audio>

    <div style="margin-top: 20px;">
        <button onclick="playAudio()" style="padding: 20px 40px; font-size: 20px;">PLAY</button>
        <button onclick="pauseAudio()" style="padding: 20px 40px; font-size: 20px;">PAUSE</button>
    </div>

    <script>
        var x = document.getElementById("myAudio"); 
        function playAudio() { 
            x.play(); 
        } 
        function pauseAudio() { 
            x.pause(); 
        } 
    </script>
</body>
