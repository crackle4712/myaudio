<body>
    <div style="padding: 20px; border: 1px solid #333; display: inline-block;">
        <h2>Nokia Media Player</h2>
        
        <audio id="nokiaAudio" controls style="width: 300px;">
            <source src="https://archive.org/download/the-complete-holy-quran-by-sheikh-mishary-al-afasy-1-3/The%20Complete%20Holy%20Quran%20By%20Sheikh%20Mishary%20Al%20Afasy%201%203.mp3" type="audio/mpeg">
            Your browser is too old.
        </audio>

        <p id="status" style="font-size: 12px; color: #888;">Status: Waiting for Play...</p>
    </div>

    <script>
        var aud = document.getElementById("nokiaAudio");
        var stat = document.getElementById("status");

        // These events tell you what's happening behind the scenes
        aud.onplay = function() { stat.innerHTML = "Status: Loading 500MB file..."; };
        aud.onplaying = function() { stat.innerHTML = "Status: Playing Now"; };
        aud.onstalled = function() { stat.innerHTML = "Status: Internet too slow..."; };
        
        // This helps the timeline update faster
        aud.onloadedmetadata = function() {
            stat.innerHTML = "Status: Length Loaded (" + Math.round(aud.duration/3600) + " hours)";
        };
    </script>
</body>
