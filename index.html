<!DOCTYPE html>
<html>
<head>
    <title>Quran Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #fff; text-align: center; padding: 10px; font-family: sans-serif; }
        .player-container { border: 2px solid #444; padding: 15px; background: #111; }
        /* This forces the audio bar to be visible and wide */
        audio { width: 100%; display: block; margin: 20px 0; height: 45px; }
        .info { font-size: 14px; color: #0f0; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="info">Mishary Al-Afasy (9 Hours)</div>
        
        <audio controls preload="metadata">
            <source src="https://archive.org/download/the-complete-holy-quran-by-sheikh-mishary-al-afasy-1-3/The%20Complete%20Holy%20Quran%20By%20Sheikh-Mishary-Al-Afasy-1-3.mp3" type="audio/mpeg">
        </audio>

        <hr color="#333">

        <p style="font-size: 12px;">If player is blank, click below:</p>
        <a href="https://archive.org/download/the-complete-holy-quran-by-sheikh-mishary-al-afasy-1-3/The%20Complete%20Holy%20Quran%20By%20Sheikh-Mishary-Al-Afasy-1-3.mp3" 
           style="color: #58a6ff; text-decoration: none; font-weight: bold;">
           [ OPEN IN PHONE PLAYER ]
        </a>
    </div>

</body>
</html>
